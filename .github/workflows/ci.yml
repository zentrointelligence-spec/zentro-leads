name: Zentro Leads CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          POSTGRES_URL: "sqlite:///:memory:"
          POSTGRES_URL_ASYNC: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET_KEY: "ci-test-secret-key-do-not-use-in-prod"
          ANTHROPIC_API_KEY: "sk-ant-dummy-for-ci"
          OPENAI_API_KEY: "sk-dummy-for-ci"
          GOOGLE_GEMINI_API_KEY: "dummy-for-ci"
          PINECONE_API_KEY: ""
          STRIPE_SECRET_KEY: "sk_test_dummy"
          BILLPLZ_API_KEY: "dummy"
          BILLPLZ_X_SIGNATURE: "test_x_sig_secret"
          RAZORPAY_KEY_ID: "dummy"
          RAZORPAY_KEY_SECRET: "test_razorpay_secret"
          RAZORPAY_WEBHOOK_SECRET: "test_webhook_secret"
          REDIS_URL: "redis://localhost:6379/15"
          COOKIE_SECURE: "false"
          COOKIE_SAMESITE: "lax"
          ELASTICSEARCH_URL: "http://localhost:9200"
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
        if: always()

  frontend-lint:
    name: Frontend Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint
