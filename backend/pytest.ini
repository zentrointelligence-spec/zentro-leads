[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
# Don't warn on asyncio fixtures — we handle the event loop explicitly
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*:
    ignore::DeprecationWarning:aiosqlite.*:
    # python-jose 3.3.0 still uses datetime.utcnow() internally (no fixed release yet).
    ignore:datetime\.datetime\.utcnow\(\) is deprecated.*:DeprecationWarning
